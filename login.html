<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ODIN · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --indigo-900:#0f1a3d;
      --indigo-700:#1f3273;
      --indigo-500:#3858c4;
      --sakura-500:#e891a9;
      --paper:#faf7f2;
      --line:#e7e1d3;
      --ink:#1a1d2b;
      --ink-soft:#5b5f72;
      --ink-mute:#9396a5;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:radial-gradient(900px 600px at -10% -20%, #fff 0%, transparent 50%), var(--paper);
      font-family:"DM Sans",sans-serif;
      color:var(--ink);
      padding:24px;
    }
    .card{
      width:min(440px,100%);
      background:rgba(255,255,255,.75);
      border:1px solid var(--line);
      padding:36px 28px;
      box-shadow:0 12px 30px rgba(15,26,61,.12);
    }
    .logo{display:grid;place-items:center;gap:10px;margin-bottom:20px}
    .logo img{width:80px;height:80px;object-fit:contain}
    .wordmark{font-family:"Cormorant Garamond",serif;font-size:34px;letter-spacing:.35em;color:var(--indigo-900);padding-left:.35em}
    .wordmark span{color:var(--sakura-500)}
    h1{margin:0 0 6px;text-align:center;font-family:"Cormorant Garamond",serif;font-weight:500;font-size:36px;color:var(--indigo-900)}
    p.sub{margin:0 0 24px;text-align:center;color:var(--ink-soft);font-size:14px}

    .field{position:relative;margin-bottom:16px}
    .field label{display:block;font:500 11px/1 "JetBrains Mono",monospace;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px}
    .field input{
      width:100%;height:48px;padding:0 14px;border:1px solid var(--line);
      background:#fff;font:500 15px/1 "DM Sans",sans-serif;color:var(--ink);outline:none;
    }
    .field input:focus{border-color:var(--indigo-700);box-shadow:0 0 0 3px rgba(31,50,115,.1)}

    .actions{display:flex;justify-content:flex-end;margin:2px 0 20px}
    .actions a{color:var(--indigo-700);text-decoration:none;font-size:13px}

    .btn{
      width:100%;height:52px;border:0;cursor:pointer;
      background:linear-gradient(90deg,var(--indigo-900),var(--indigo-500));
      color:#fff;font:600 13px/1 "DM Sans",sans-serif;letter-spacing:.18em;text-transform:uppercase;
    }
    .btn:hover{filter:brightness(1.04)}
    .error{display:none;margin:14px 0 0;padding:10px;border:1px solid #f2b8c6;background:#fde8ec;color:#8a1c3c;font-size:13px}
  </style>
</head>
<body>
  <form class="card" id="loginForm">
    <div class="logo">
      <img src="LOGO ODIN PNG.png" alt="Logo ODIN" />
      <div class="wordmark">O<span>·</span>D<span>·</span>I<span>·</span>N</div>
    </div>

    <h1>Seja bem-vindo</h1>
    <p class="sub">Entre com suas credenciais para acessar o painel.</p>

    <div class="field">
      <label for="user">Usuário</label>
      <input id="user" type="text" placeholder="seu.usuario" autocomplete="username" required />
    </div>

    <div class="field">
      <label for="pwd">Senha</label>
      <input id="pwd" type="password" placeholder="••••••••••" autocomplete="current-password" required />
    </div>

    <div class="actions">
      <a href="#" onclick="event.preventDefault()">Esqueci minha senha</a>
    </div>

    <button class="btn" type="submit">Entrar no Odin</button>
    <div id="loginError" class="error"></div>
  </form>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (event) {
      event.preventDefault();
      const user = document.getElementById('user').value.trim();
      const pwd = document.getElementById('pwd').value.trim();
      const error = document.getElementById('loginError');

      if (!user || !pwd) {
        error.textContent = 'Preencha usuário e senha para continuar.';
        error.style.display = 'block';
        return;
      }

      error.style.display = 'none';
      alert('Login validado visualmente. Próximo passo: integrar com backend.');
    });
  </script>
</body>
</html>
