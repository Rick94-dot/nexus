<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O.D.I.N — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,400&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:       #1c3a5e;
      --navy-deep:  #14294a;
      --navy-mid:   #25497a;
      --navy-glow:  rgba(28, 58, 94, 0.15);
      --input-bg:   rgba(28, 58, 94, 0.07);
      --input-hover:rgba(28, 58, 94, 0.11);
      --muted:      #6b82a0;
      --paper:      #f8f9fb;
      --white:      #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Nunito Sans', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ===================== LAYOUT ===================== */
    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    /* ===================== LADO ESQUERDO ===================== */
    .login-side {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: var(--paper);
      overflow: hidden;
      z-index: 2;
    }

    /* Gradiente radial de fundo */
    .login-side::before {
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(28,58,94,0.055) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 85% 90%, rgba(28,58,94,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Partículas */
    #particles {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ---- CARD ---- */
    .card {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 390px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(28,58,94,0.09);
      border-radius: 24px;
      box-shadow:
        0 2px 4px rgba(28,58,94,0.04),
        0 8px 24px rgba(28,58,94,0.07),
        0 32px 64px rgba(28,58,94,0.06);
      padding: 44px 40px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ---- Animações de entrada ---- */
    .fade-up {
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.75s cubic-bezier(.18,.7,.2,1) forwards;
    }
    .d1 { animation-delay: 0.10s; }
    .d2 { animation-delay: 0.30s; }
    .d3 { animation-delay: 0.50s; }
    .d4 { animation-delay: 0.70s; }
    .d5 { animation-delay: 0.90s; }
    .d6 { animation-delay: 1.10s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- Logo ---- */
    .logo {
      width: 200px;
      height: auto;
      margin-bottom: 10px;
      filter: drop-shadow(0 8px 20px rgba(28,58,94,0.14));
      opacity: 0;
      transform: translateY(14px) scale(0.97);
      animation:
        logoIn  0.9s cubic-bezier(.18,.7,.2,1) 0.1s forwards,
        breathe 7s  ease-in-out 2s infinite;
    }

    @keyframes logoIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes breathe {
      0%,100% { transform: translateY(0) scale(1); }
      50%     { transform: translateY(-4px) scale(1.018); }
    }

    /* ---- Título letter-by-letter ---- */
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 52px;
      letter-spacing: 0.04em;
      color: var(--navy);
      line-height: 1;
      display: flex;
      justify-content: center;
    }
    .brand-name .l {
      display: inline-block;
      opacity: 0;
      transform: translateY(16px);
      animation: letterIn 0.55s cubic-bezier(.18,.7,.2,1) forwards;
    }
    .brand-name .l:nth-child(1){animation-delay:.55s}
    .brand-name .l:nth-child(2){animation-delay:.66s}
    .brand-name .l:nth-child(3){animation-delay:.77s}
    .brand-name .l:nth-child(4){animation-delay:.88s}
    .brand-name .l:nth-child(5){animation-delay:.99s}
    .brand-name .l:nth-child(6){animation-delay:1.10s}
    .brand-name .l:nth-child(7){animation-delay:1.21s}
    @keyframes letterIn { to { opacity:1; transform:translateY(0); } }

    /* ---- Subtítulo ---- */
    .welcome {
      font-weight: 300;
      font-size: 20px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.01em;
    }

    /* ---- Ornamento ---- */
    .ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 26px;
      color: rgba(28,58,94,0.3);
      width: 100%;
      justify-content: center;
    }
    .orn-line {
      flex: 1;
      max-width: 72px;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      animation: growLine 0.7s cubic-bezier(.18,.7,.2,1) 1.5s forwards;
    }
    .orn-line:first-child { transform-origin: right; }
    .orn-line:last-child  { transform-origin: left; }
    .orn-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      transform: scale(0);
      animation: popDot 0.4s cubic-bezier(.18,.7,.2,1) 1.75s forwards;
    }
    @keyframes growLine { to { transform: scaleX(1); } }
    @keyframes popDot   { to { transform: scale(1); } }

    /* ---- Formulário ---- */
    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      position: relative;
      width: 100%;
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid rgba(28,58,94,0.12);
      border-radius: 14px;
      padding: 18px 20px 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--navy);
      outline: none;
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s, transform 0.2s;
    }
    .field input:hover {
      background: var(--input-hover);
    }
    .field input:focus {
      background: var(--white);
      border-color: var(--navy-mid);
      box-shadow: 0 0 0 4px var(--navy-glow);
      transform: translateY(-1px);
    }
    .field input::placeholder { color: transparent; }

    .floating-label {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--muted);
      pointer-events: none;
      transition: all 0.22s cubic-bezier(.18,.7,.2,1);
      background: transparent;
    }
    .field input:focus + .floating-label,
    .field input:not(:placeholder-shown) + .floating-label {
      top: 9px;
      transform: translateY(0);
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--navy-mid);
    }

    .input-wrap { position: relative; }
    .input-wrap.has-icon input { padding-right: 50px; }

    .toggle-pw {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 6px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      display: grid; place-items: center;
    }
    .toggle-pw:hover {
      color: var(--navy);
      background: rgba(28,58,94,0.06);
    }

    /* ---- Linha "esqueceu a senha" ---- */
    .extra-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 2px;
    }
    .forgot-link {
      font-size: 12.5px;
      color: var(--muted);
      text-decoration: none;
      position: relative;
      transition: color 0.2s;
      background: none; border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
    }
    .forgot-link::after {
      content: "";
      position: absolute; left: 0; bottom: -1px;
      width: 100%; height: 1px;
      background: var(--navy-mid);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.25s ease;
    }
    .forgot-link:hover { color: var(--navy); }
    .forgot-link:hover::after { transform: scaleX(1); transform-origin: left; }

    /* ---- Botão ENTRAR ---- */
    .btn {
      margin-top: 8px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy) 60%, var(--navy-deep) 100%);
      color: var(--white);
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-weight: 700;
      font-size: 13.5px;
      letter-spacing: 0.14em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(28,58,94,0.3);
    }
    .btn::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: translateX(-100%);
      transition: transform 0.55s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(28,58,94,0.38);
    }
    .btn:hover::before { transform: translateX(100%); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { cursor: wait; opacity: 0.8; }
    .btn-text { position: relative; z-index: 1; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }
    .btn.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Rodapé da versão ---- */
    .version-tag {
      margin-top: 22px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(28,58,94,0.28);
    }

    /* ---- Toast "esqueceu a senha" ---- */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--navy);
      color: var(--white);
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.5;
      text-align: center;
      box-shadow: 0 8px 32px rgba(28,58,94,0.35);
      max-width: 320px;
      width: calc(100% - 48px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(.18,.7,.2,1);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast-icon {
      flex-shrink: 0;
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: grid; place-items: center;
    }

    /* ===================== LADO DIREITO ===================== */
    .right-side {
      position: relative;
      background-image: url('cerejeira.jpg');
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    /* Transição suave: faixa branca que "dissolve" na foto */
    .right-side::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(
        to right,
        var(--paper)           0%,
        rgba(248,249,251,0.82) 8%,
        rgba(248,249,251,0.42) 18%,
        rgba(248,249,251,0.10) 30%,
        transparent            46%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* Vinheta nas demais bordas */
    .right-side::after {
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 45%, rgba(100,40,60,0.22) 100%),
        linear-gradient(to bottom, rgba(255,255,255,0.06) 0%, transparent 25%, transparent 75%, rgba(60,20,35,0.14) 100%);
      pointer-events: none;
      z-index: 1;
    }

    #petals {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 3;
    }

    /* ===================== RESPONSIVO ===================== */
    @media (max-width: 860px) {
      body { overflow: auto; }
      .page { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      .right-side { display: none; }
      .login-side { min-height: 100vh; padding: 28px 20px; }
      .card { padding: 36px 28px 32px; }
      .logo { width: 160px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ========== LADO ESQUERDO ========== -->
  <section class="login-side">
    <canvas id="particles"></canvas>

    <div class="card">
      <img src="logo_odin.png" alt="Logo O.D.I.N" class="logo" />

      <h1 class="brand-name" aria-label="O.D.I.N">
        <span class="l">O</span><span class="l">.</span><span class="l">D</span><span class="l">.</span><span class="l">I</span><span class="l">.</span><span class="l">N</span>
      </h1>

      <p class="welcome fade-up d3">Seja bem-vindo</p>

      <div class="ornament" aria-hidden="true">
        <div class="orn-line"></div>
        <div class="orn-dot"></div>
        <div class="orn-dot"></div>
        <div class="orn-dot"></div>
        <div class="orn-line"></div>
      </div>

      <form id="loginForm" novalidate class="fade-up d5">
        <div class="field">
          <div class="input-wrap">
            <input type="text" id="user" name="user" placeholder=" " required autocomplete="username" />
            <label for="user" class="floating-label">Usuário</label>
          </div>
        </div>

        <div class="field">
          <div class="input-wrap has-icon">
            <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password" />
            <label for="password" class="floating-label">Senha</label>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar senha">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="extra-row">
          <button type="button" class="forgot-link" id="forgotBtn">Esqueceu a senha?</button>
        </div>

        <button type="submit" class="btn" id="submitBtn">
          <span class="btn-text">ENTRAR</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
      </form>

      <p class="version-tag fade-up d6">Sistema O.D.I.N · v1.0</p>
    </div>
  </section>

  <!-- ========== LADO DIREITO ========== -->
  <section class="right-side">
    <canvas id="petals"></canvas>
  </section>

</div>

<!-- Toast -->
<div class="toast" id="toast" role="alert" aria-live="polite">
  <div class="toast-icon">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  </div>
  <span>Para redefinir sua senha, por gentileza, fale com um administrador.</span>
</div>

<script>
  /* ========== PARTÍCULAS ========== */
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let particles = [], W, H;

  function resizeParticles() {
    const r = canvas.parentElement.getBoundingClientRect();
    W = canvas.width  = r.width  * devicePixelRatio;
    H = canvas.height = r.height * devicePixelRatio;
    canvas.style.width  = r.width  + 'px';
    canvas.style.height = r.height + 'px';
  }
  resizeParticles();
  window.addEventListener('resize', resizeParticles);

  for (let i = 0; i < 40; i++) particles.push({
    x: Math.random() * 2000,
    y: Math.random() * 1200,
    r: (Math.random() * 1.4 + 0.4) * devicePixelRatio,
    vx: (Math.random() - 0.5) * 0.12,
    vy: -(Math.random() * 0.22 + 0.05),
    alpha: Math.random() * 0.28 + 0.08,
    phase: Math.random() * Math.PI * 2
  });

  (function animPart(t) {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.vx + Math.sin(t / 2200 + p.phase) * 0.12;
      p.y += p.vy;
      if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      const tw = 0.65 + 0.35 * Math.sin(t / 900 + p.phase);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(28,58,94,${p.alpha * tw})`;
      ctx.fill();
    });
    requestAnimationFrame(animPart);
  })(0);

  /* ========== OLHO (mostrar/ocultar senha) ========== */
  const pwInput   = document.getElementById('password');
  const toggleBtn = document.getElementById('togglePw');
  const eyeIcon   = document.getElementById('eyeIcon');

  const eyeOpen   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  toggleBtn.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show ? eyeClosed : eyeOpen;
    toggleBtn.setAttribute('aria-label', show ? 'Ocultar senha' : 'Mostrar senha');
  });

  /* ========== TOAST "ESQUECEU A SENHA" ========== */
  const toast     = document.getElementById('toast');
  const forgotBtn = document.getElementById('forgotBtn');
  let toastTimer;

  forgotBtn.addEventListener('click', () => {
    clearTimeout(toastTimer);
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 4500);
  });

  /* ========== SUBMIT ========== */
  const form      = document.getElementById('loginForm');
  const submitBtn = document.getElementById('submitBtn');
  const btnText   = submitBtn.querySelector('.btn-text');

  form.addEventListener('submit', e => {
    e.preventDefault();
    const user = document.getElementById('user').value.trim();
    const pass = pwInput.value;

    if (!user || !pass) {
      btnText.textContent = 'PREENCHA OS CAMPOS';
      submitBtn.style.background = 'linear-gradient(135deg,#8b2c2c,#6b1f1f)';
      setTimeout(() => {
        btnText.textContent = 'ENTRAR';
        submitBtn.style.background = '';
      }, 2000);
      return;
    }

    submitBtn.classList.add('loading');
    submitBtn.disabled = true;
    btnText.textContent = 'ENTRANDO';

    // ← substitua pelo seu fetch/autenticação real
    setTimeout(() => {
      submitBtn.classList.remove('loading');
      btnText.textContent = 'BEM-VINDO ✓';
      submitBtn.style.background = 'linear-gradient(135deg,#2d6a4f,#1e4d39)';
    }, 1400);
  });

  /* ========== PÉTALAS ========== */
  const pc   = document.getElementById('petals');
  const pCtx = pc.getContext('2d');
  let petals = [], pW, pH;

  function resizePetals() {
    const r = pc.parentElement.getBoundingClientRect();
    pW = pc.width  = r.width  * devicePixelRatio;
    pH = pc.height = r.height * devicePixelRatio;
    pc.style.width  = r.width  + 'px';
    pc.style.height = r.height + 'px';
  }
  resizePetals();
  window.addEventListener('resize', () => { resizePetals(); initPetals(); });

  const petalColors = [
    [255,182,193],[255,160,180],[250,145,168],[255,200,210],[240,128,158],[255,220,228]
  ];

  function mkPetal(fresh = false) {
    const s = (Math.random() * 9 + 5) * devicePixelRatio;
    const c = petalColors[Math.floor(Math.random() * petalColors.length)];
    return {
      x: Math.random() * pW,
      y: fresh ? -s * 2 : Math.random() * pH,
      s, c,
      vy:  (Math.random() * 0.65 + 0.3)  * devicePixelRatio,
      vx:  (Math.random() - 0.5) * 0.35  * devicePixelRatio,
      rot: Math.random() * Math.PI * 2,
      rs:  (Math.random() - 0.5) * 0.022,
      sw:  Math.random() * Math.PI * 2,
      swr: Math.random() * 0.55 + 0.18,
      sws: Math.random() * 0.011 + 0.005,
      a:   Math.random() * 0.4 + 0.45,
    };
  }

  function initPetals() { petals = Array.from({length: 42}, () => mkPetal(false)); }
  initPetals();

  function drawPetal(p) {
    pCtx.save();
    pCtx.translate(p.x, p.y);
    pCtx.rotate(p.rot);
    pCtx.globalAlpha = p.a;
    pCtx.beginPath();
    pCtx.scale(1, 0.52);
    pCtx.arc(0, 0, p.s, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(${p.c[0]},${p.c[1]},${p.c[2]},0.88)`;
    pCtx.fill();
    pCtx.beginPath();
    pCtx.scale(0.52, 0.88);
    pCtx.arc(p.s * 0.18, -p.s * 0.12, p.s * 0.48, 0, Math.PI * 2);
    pCtx.fillStyle = 'rgba(255,255,255,0.3)';
    pCtx.fill();
    pCtx.restore();
  }

  (function animPetals() {
    pCtx.clearRect(0, 0, pW, pH);
    petals.forEach(p => {
      p.sw += p.sws;
      p.x  += p.vx + Math.sin(p.sw) * p.swr * devicePixelRatio;
      p.y  += p.vy;
      p.rot += p.rs;
      if (p.y > pH + p.s * 2) Object.assign(p, mkPetal(true));
      drawPetal(p);
    });
    requestAnimationFrame(animPetals);
  })();
</script>
