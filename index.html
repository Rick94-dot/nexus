<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O.D.I.N — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #1c3a5e;
      --navy-deep: #14294a;
      --navy-hover: #25497a;
      --navy-glow: rgba(28, 58, 94, 0.18);
      --input-bg: #d4dde3;
      --input-bg-focus: #c5d2da;
      --text-muted: #5a7088;
      --white: #ffffff;
      --paper: #fafbfc;
      --black: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Nunito Sans', -apple-system, sans-serif;
      background: var(--white);
      color: var(--navy);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    /* ----------- LADO ESQUERDO ----------- */
    .login-side {
      background:
        radial-gradient(ellipse at top left, rgba(28, 58, 94, 0.04), transparent 60%),
        radial-gradient(ellipse at bottom right, rgba(28, 58, 94, 0.03), transparent 60%),
        var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    /* Canvas das partículas (atrás de tudo) */
    #particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* Textura de papel sutil */
    .login-side::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.11 0 0 0 0 0.23 0 0 0 0 0.37 0 0 0 0.04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      opacity: 0.7;
      pointer-events: none;
      z-index: 2;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 3;
    }

    /* Animação de entrada */
    .anim-in {
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.8s cubic-bezier(.2,.7,.2,1) forwards;
    }
    .delay-1 { animation-delay: 0.15s; }
    .delay-2 { animation-delay: 0.35s; }
    .delay-3 { animation-delay: 0.55s; }
    .delay-4 { animation-delay: 0.75s; }
    .delay-5 { animation-delay: 0.95s; }
    .delay-6 { animation-delay: 1.15s; }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo com "respiração" */
    .logo {
      width: 240px;
      height: auto;
      margin-bottom: 16px;
      filter: drop-shadow(0 6px 24px rgba(28, 58, 94, 0.12));
      animation:
        rise 0.8s cubic-bezier(.2,.7,.2,1) forwards,
        breathe 6s ease-in-out 1.6s infinite;
      opacity: 0;
      transform: translateY(12px);
      animation-delay: 0.15s, 1.6s;
    }

    @keyframes breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-3px) scale(1.015); }
    }

    /* Título O.D.I.N — reveal letra por letra */
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 50px;
      letter-spacing: 0.03em;
      color: var(--navy);
      line-height: 1;
      display: flex;
      gap: 2px;
      justify-content: center;
    }

    .brand-name .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(14px);
      animation: letterIn 0.6s cubic-bezier(.2,.7,.2,1) forwards;
    }
    .brand-name .letter:nth-child(1) { animation-delay: 0.5s; }
    .brand-name .letter:nth-child(2) { animation-delay: 0.62s; }
    .brand-name .letter:nth-child(3) { animation-delay: 0.74s; }
    .brand-name .letter:nth-child(4) { animation-delay: 0.86s; }
    .brand-name .letter:nth-child(5) { animation-delay: 0.98s; }
    .brand-name .letter:nth-child(6) { animation-delay: 1.10s; }
    .brand-name .letter:nth-child(7) { animation-delay: 1.22s; }

    @keyframes letterIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 300;
      font-size: 26px;
      color: var(--navy);
      margin-top: 10px;
      letter-spacing: -0.005em;
    }

    /* Ornamento decorativo */
    .ornament {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 22px 0 30px;
      color: var(--navy);
      opacity: 0.55;
    }
    .ornament-line {
      width: 60px;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      animation: lineGrow 0.8s cubic-bezier(.2,.7,.2,1) 1.4s forwards;
    }
    .ornament-line.left  { transform-origin: right center; }
    .ornament-line.right { transform-origin: left  center; }
    .ornament-diamond {
      width: 6px;
      height: 6px;
      background: currentColor;
      transform: rotate(45deg) scale(0);
      animation: diamondIn 0.5s cubic-bezier(.2,.7,.2,1) 1.6s forwards;
    }

    @keyframes lineGrow  { to { transform: scaleX(1); } }
    @keyframes diamondIn { to { transform: rotate(45deg) scale(1); } }

    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Floating label fields */
    .field {
      width: 100%;
      position: relative;
    }

    .input-wrap {
      position: relative;
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 2px solid transparent;
      border-radius: 999px;
      padding: 16px 22px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--navy);
      outline: none;
      transition: all 0.3s cubic-bezier(.2,.7,.2,1);
    }

    .field input:focus {
      background: var(--input-bg-focus);
      border-color: var(--navy);
      box-shadow: 0 0 0 6px var(--navy-glow);
      transform: translateY(-1px);
    }

    .field input::placeholder { color: transparent; }

    .field .floating-label {
      position: absolute;
      top: 50%;
      left: 22px;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
      transition: all 0.25s cubic-bezier(.2,.7,.2,1);
      background: transparent;
      padding: 0 6px;
    }

    .field input:focus + .floating-label,
    .field input:not(:placeholder-shown) + .floating-label {
      top: 0;
      left: 18px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--navy);
      background: var(--paper);
    }

    .input-wrap.has-icon input { padding-right: 50px; }

    .toggle-pw {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--navy);
      display: grid;
      place-items: center;
      padding: 6px;
      border-radius: 50%;
      transition: all 0.2s;
      z-index: 2;
    }
    .toggle-pw:hover {
      background: rgba(28, 58, 94, 0.1);
      transform: translateY(-50%) scale(1.08);
    }

    /* Linha esqueceu senha */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -4px;
    }
    .forgot-link {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      position: relative;
      transition: color 0.2s;
    }
    .forgot-link::after {
      content: "";
      position: absolute;
      left: 0; bottom: -2px;
      width: 100%; height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: right center;
      transition: transform 0.3s ease;
    }
    .forgot-link:hover {
      color: var(--navy);
    }
    .forgot-link:hover::after {
      transform: scaleX(1);
      transform-origin: left center;
    }

    /* Botão */
    .btn {
      margin-top: 14px;
      align-self: center;
      padding: 15px 60px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(.2,.7,.2,1);
      position: relative;
      overflow: hidden;
      min-width: 200px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* Shimmer effect */
    .btn::before {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.25),
        transparent
      );
      transition: left 0.6s ease;
    }

    .btn:hover {
      background: var(--navy-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(28, 58, 94, 0.3);
    }
    .btn:hover::before { left: 100%; }
    .btn:active { transform: translateY(0); }

    .btn:disabled {
      cursor: wait;
      opacity: 0.85;
    }

    .btn-text { position: relative; z-index: 1; }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn.loading .spinner { display: inline-block; }
    .btn.loading .btn-text { opacity: 0.85; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ----------- LADO DIREITO (cerejeira + pétalas) ----------- */
    .right-side {
      position: relative;
      background-image: url('cerejeira.jpg');
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    /* Transição suave da esquerda (branco) para a foto */
    .right-side::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        var(--paper) 0%,
        rgba(250, 251, 252, 0.55) 12%,
        rgba(250, 251, 252, 0.0) 32%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* Vinheta sutil pra dar profundidade nas bordas */
    .right-side::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 50%, rgba(120, 60, 80, 0.25) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, transparent 30%, transparent 70%, rgba(80, 30, 50, 0.15) 100%);
      pointer-events: none;
      z-index: 1;
    }

    #petals {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
    }

    /* ----------- RESPONSIVO ----------- */
    @media (max-width: 860px) {
      body { overflow: auto; }
      .page { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      .right-side { display: none; }
      .login-side { min-height: 100vh; padding: 32px 24px; }
      .logo { width: 150px; }
      .brand-name { font-size: 42px; }
      .welcome { font-size: 22px; }
    }

    /* Prefere movimento reduzido */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- LADO LOGIN -->
    <section class="login-side">
      <canvas id="particles"></canvas>

      <div class="login-wrap">
        <img src="logo_odin.png" alt="O.D.I.N logo" class="logo" />

        <h1 class="brand-name" aria-label="O.D.I.N">
          <span class="letter">O</span>
          <span class="letter">.</span>
          <span class="letter">D</span>
          <span class="letter">.</span>
          <span class="letter">I</span>
          <span class="letter">.</span>
          <span class="letter">N</span>
        </h1>

        <p class="welcome anim-in delay-4">Seja bem-vindo</p>

        <div class="ornament" aria-hidden="true">
          <div class="ornament-line left"></div>
          <div class="ornament-diamond"></div>
          <div class="ornament-line right"></div>
        </div>

        <form id="loginForm" novalidate class="anim-in delay-5" style="animation-delay: 1.7s;">
          <div class="field">
            <div class="input-wrap">
              <input type="text" id="user" name="user" placeholder=" " required autocomplete="username" />
              <label for="user" class="floating-label">Informe seu usuário</label>
            </div>
          </div>

          <div class="field">
            <div class="input-wrap has-icon">
              <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password" />
              <label for="password" class="floating-label">Informe sua senha</label>
              <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar senha">
                <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="forgot-row">
            <a href="#" class="forgot-link">Esqueceu a senha?</a>
          </div>

          <button type="submit" class="btn" id="submitBtn">
            <span class="btn-text">ENTRAR</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
        </form>
      </div>
    </section>

    <!-- LADO DIREITO (cerejeira + pétalas) -->
    <section class="right-side">
      <canvas id="petals"></canvas>
    </section>

  </div>

  <script>
    /* ========== PARTÍCULAS FLUTUANTES ========== */
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let W, H;

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      W = canvas.width  = rect.width  * devicePixelRatio;
      H = canvas.height = rect.height * devicePixelRatio;
      canvas.style.width  = rect.width  + 'px';
      canvas.style.height = rect.height + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    function createParticles(count) {
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: (Math.random() * 1.6 + 0.4) * devicePixelRatio,
          vx: (Math.random() - 0.5) * 0.15,
          vy: -Math.random() * 0.25 - 0.05,
          alpha: Math.random() * 0.35 + 0.1,
          phase: Math.random() * Math.PI * 2
        });
      }
    }
    createParticles(45);

    function animate(t) {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        p.x += p.vx + Math.sin((t / 2000) + p.phase) * 0.15;
        p.y += p.vy;
        if (p.y < -10)        { p.y = H + 10; p.x = Math.random() * W; }
        if (p.x < -10)        p.x = W + 10;
        if (p.x > W + 10)     p.x = -10;

        const twinkle = 0.7 + 0.3 * Math.sin(t / 800 + p.phase);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(28, 58, 94, ${p.alpha * twinkle})`;
        ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    /* ========== MOSTRAR / OCULTAR SENHA ========== */
    const pwInput   = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePw');
    const eyeIcon   = document.getElementById('eyeIcon');

    const eyeOpen = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    `;
    const eyeClosed = `
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    `;

    toggleBtn.addEventListener('click', () => {
      const isPw = pwInput.type === 'password';
      pwInput.type = isPw ? 'text' : 'password';
      eyeIcon.innerHTML = isPw ? eyeClosed : eyeOpen;
      toggleBtn.setAttribute('aria-label', isPw ? 'Ocultar senha' : 'Mostrar senha');
    });

    /* ========== SUBMIT ========== */
    const form      = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText   = submitBtn.querySelector('.btn-text');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('user').value.trim();
      const pass = pwInput.value;

      if (!user || !pass) {
        btnText.textContent = 'PREENCHA OS CAMPOS';
        submitBtn.style.background = '#a23b3b';
        setTimeout(() => {
          btnText.textContent = 'ENTRAR';
          submitBtn.style.background = '';
        }, 1800);
        return;
      }

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
      btnText.textContent = 'ENTRANDO';

      // simulação — substitua pela chamada real de autenticação
      setTimeout(() => {
        submitBtn.classList.remove('loading');
        btnText.textContent = 'BEM-VINDO ✓';
        submitBtn.style.background = '#2d6a4f';
        // aqui você faria o redirecionamento ou a chamada à API
      }, 1400);
    });

    /* ========== PÉTALAS CAINDO ========== */
    const petalCanvas = document.getElementById('petals');
    const pCtx = petalCanvas.getContext('2d');
    let petals = [];
    let pW, pH;

    function resizePetals() {
      const r = petalCanvas.parentElement.getBoundingClientRect();
      pW = petalCanvas.width  = r.width  * devicePixelRatio;
      pH = petalCanvas.height = r.height * devicePixelRatio;
      petalCanvas.style.width  = r.width  + 'px';
      petalCanvas.style.height = r.height + 'px';
    }
    resizePetals();
    window.addEventListener('resize', () => { resizePetals(); spawnPetals(); });

    const petalColors = [
      'rgba(255,182,193,',
      'rgba(255,160,180,',
      'rgba(250,145,168,',
      'rgba(255,200,210,',
      'rgba(240,128,158,',
      'rgba(255,220,228,',
    ];

    function makePetal(fromTop = false) {
      const size = (Math.random() * 10 + 6) * devicePixelRatio;
      return {
        x:       Math.random() * pW,
        y:       fromTop ? -size * 2 : Math.random() * pH,
        size,
        speedY:  (Math.random() * 0.7 + 0.35) * devicePixelRatio,
        speedX:  (Math.random() - 0.5) * 0.4 * devicePixelRatio,
        rot:     Math.random() * Math.PI * 2,
        rotSpd:  (Math.random() - 0.5) * 0.025,
        swing:   Math.random() * Math.PI * 2,
        swingR:  Math.random() * 0.6 + 0.2,
        swingSpd:Math.random() * 0.012 + 0.006,
        alpha:   Math.random() * 0.45 + 0.45,
        color:   petalColors[Math.floor(Math.random() * petalColors.length)],
      };
    }

    function spawnPetals() {
      petals = Array.from({ length: 38 }, () => makePetal(false));
    }
    spawnPetals();

    function drawPetal(p) {
      pCtx.save();
      pCtx.translate(p.x, p.y);
      pCtx.rotate(p.rot);
      pCtx.globalAlpha = p.alpha;
      // corpo da pétala
      pCtx.beginPath();
      pCtx.scale(1, 0.55);
      pCtx.arc(0, 0, p.size, 0, Math.PI * 2);
      pCtx.fillStyle = `${p.color}0.88)`;
      pCtx.fill();
      // reflexo interno suave
      pCtx.beginPath();
      pCtx.scale(0.55, 0.9);
      pCtx.arc(p.size * 0.2, -p.size * 0.1, p.size * 0.5, 0, Math.PI * 2);
      pCtx.fillStyle = 'rgba(255,255,255,0.32)';
      pCtx.fill();
      pCtx.restore();
    }

    function animatePetals() {
      pCtx.clearRect(0, 0, pW, pH);
      petals.forEach(p => {
        p.swing += p.swingSpd;
        p.x += p.speedX + Math.sin(p.swing) * p.swingR * devicePixelRatio;
        p.y += p.speedY;
        p.rot += p.rotSpd;
        if (p.y > pH + p.size * 2) Object.assign(p, makePetal(true));
        drawPetal(p);
      });
      requestAnimationFrame(animatePetals);
    }
    requestAnimationFrame(animatePetals);
  </script>
</body>
</html>
