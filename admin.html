<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O.D.I.N — Painel Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:      #1c3a5e;
      --navy-mid:  #25497a;
      --navy-deep: #14294a;
      --navy-pale: #e8edf3;
      --accent:    #c0392b;
      --green:     #2d6a4f;
      --muted:     #6b82a0;
      --paper:     #f4f6f9;
      --white:     #ffffff;
      --border:    rgba(28,58,94,0.1);
      --shadow:    0 2px 12px rgba(28,58,94,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--paper);
      color: var(--navy);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 1px 8px rgba(28,58,94,0.06);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(28,58,94,0.15));
    }

    .header-text h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .header-text p {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .admin-badge {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--navy-mid);
      background: var(--navy-pale);
      padding: 6px 14px;
      border-radius: 999px;
    }

    .btn-logout {
      padding: 9px 22px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ===== MAIN ===== */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* ===== TOOLBAR ===== */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .toolbar-left h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 32px;
      letter-spacing: -0.01em;
    }

    .toolbar-left p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .btn-new {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--navy-mid), var(--navy-deep));
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(28,58,94,0.25);
      transition: all 0.2s;
    }
    .btn-new:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(28,58,94,0.35);
    }
    .btn-new svg { flex-shrink: 0; }

    /* ===== USERS GRID ===== */
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    /* ===== USER CARD ===== */
    .user-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s;
      opacity: 0;
      transform: translateY(10px);
      animation: cardIn 0.5s cubic-bezier(.2,.7,.2,1) forwards;
    }
    .user-card:hover {
      box-shadow: 0 6px 24px rgba(28,58,94,0.13);
      transform: translateY(-2px);
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      background: linear-gradient(135deg, var(--navy-mid), var(--navy-deep));
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .card-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: grid;
      place-items: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.25);
    }

    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-username {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
    }

    .card-role {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .role-admin { background: rgba(255,255,255,0.2); color: var(--white); }
    .role-user  { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.75); }

    .card-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      font-size: 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .status-dot.active   { background: #27ae60; }
    .status-dot.inactive { background: #e74c3c; }

    .card-actions {
      display: flex;
      flex-direction: column;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 20px;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      font-family: inherit;
      font-size: 13.5px;
      color: var(--navy);
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      width: 100%;
    }
    .action-btn:last-child { border-bottom: none; }
    .action-btn:hover { background: var(--paper); }
    .action-btn.danger:hover { background: #fdf2f2; color: var(--accent); }
    .action-btn.warning:hover { background: #fdf8f2; color: #e67e22; }
    .action-btn svg { flex-shrink: 0; opacity: 0.6; }
    .action-btn:hover svg { opacity: 1; }

    /* ===== EMPTY STATE ===== */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty svg { opacity: 0.3; margin-bottom: 16px; }
    .empty p { font-size: 15px; }

    /* ===== LOADING ===== */
    .loading-wrap {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      padding: 80px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(20,41,74,0.45);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--white);
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      padding: 36px;
      box-shadow: 0 24px 64px rgba(28,58,94,0.25);
      transform: translateY(12px) scale(0.98);
      transition: transform 0.25s cubic-bezier(.2,.7,.2,1);
      margin: 16px;
    }
    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 26px;
      margin-bottom: 6px;
    }
    .modal p.modal-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: var(--navy);
      background: var(--paper);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--navy-mid);
      box-shadow: 0 0 0 4px rgba(28,58,94,0.1);
      background: var(--white);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-cancel {
      flex: 1;
      padding: 13px;
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--navy); color: var(--navy); }

    .btn-confirm {
      flex: 2;
      padding: 13px;
      background: linear-gradient(135deg, var(--navy-mid), var(--navy-deep));
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 700;
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(28,58,94,0.25);
    }
    .btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(28,58,94,0.35); }
    .btn-confirm.danger { background: linear-gradient(135deg, #c0392b, #96281b); box-shadow: 0 4px 14px rgba(192,57,43,0.25); }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--navy);
      color: var(--white);
      padding: 13px 22px;
      border-radius: 12px;
      font-size: 13.5px;
      box-shadow: 0 8px 28px rgba(28,58,94,0.3);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(.2,.7,.2,1);
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error   { background: var(--accent); }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      main   { padding: 24px 16px; }
      .admin-badge { display: none; }
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="header-brand">
    <img src="logo_odin.png" alt="O.D.I.N" class="header-logo" />
    <div class="header-text">
      <h1>O.D.I.N</h1>
      <p>Painel de Administrador</p>
    </div>
  </div>
  <div class="header-right">
    <span class="admin-badge" id="adminName">Admin</span>
    <button class="btn-logout" onclick="logout()">SAIR</button>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main>
  <div class="toolbar">
    <div class="toolbar-left">
      <h2>Usuários</h2>
      <p id="userCount">Carregando...</p>
    </div>
    <button class="btn-new" onclick="openModal('create')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Cadastrar novo usuário
    </button>
  </div>

  <div class="users-grid" id="usersGrid">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</main>

<!-- ===== MODAL CRIAR USUÁRIO ===== -->
<div class="modal-overlay" id="modalCreate">
  <div class="modal">
    <h3>Novo usuário</h3>
    <p class="modal-sub">Preencha os dados para criar um novo acesso.</p>
    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" id="newName" placeholder="Ex: João Silva" />
    </div>
    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="newUsername" placeholder="Ex: joao.silva" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" />
    </div>
    <div class="form-group">
      <label>Perfil</label>
      <select id="newRole">
        <option value="user">Usuário</option>
        <option value="admin">Administrador</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('create')">Cancelar</button>
      <button class="btn-confirm" onclick="createUser()">Criar usuário</button>
    </div>
  </div>
</div>

<!-- ===== MODAL ALTERAR SENHA ===== -->
<div class="modal-overlay" id="modalPassword">
  <div class="modal">
    <h3>Alterar senha</h3>
    <p class="modal-sub" id="passwordModalSub">Digite a nova senha do usuário.</p>
    <div class="form-group">
      <label>Nova senha</label>
      <input type="password" id="newPwValue" placeholder="Mínimo 6 caracteres" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('password')">Cancelar</button>
      <button class="btn-confirm" onclick="changePassword()">Salvar senha</button>
    </div>
  </div>
</div>

<!-- ===== MODAL CONFIRMAR DELEÇÃO ===== -->
<div class="modal-overlay" id="modalDelete">
  <div class="modal">
    <h3>Deletar usuário</h3>
    <p class="modal-sub" id="deleteModalSub">Esta ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('delete')">Cancelar</button>
      <button class="btn-confirm danger" onclick="deleteUser()">Deletar</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
  const API_URL = 'https://nexus-backend-d4hj.onrender.com';

  // ===== AUTENTICAÇÃO =====
  const token = localStorage.getItem('odin_token');
  const role  = localStorage.getItem('odin_role');
  const name  = localStorage.getItem('odin_name');

  // Protege a página — só admin entra
  if (!token || role !== 'admin') {
    window.location.href = 'index.html';
  }

  document.getElementById('adminName').textContent = name || 'Admin';

  function logout() {
    localStorage.removeItem('odin_token');
    localStorage.removeItem('odin_role');
    localStorage.removeItem('odin_name');
    window.location.href = 'index.html';
  }

  // ===== TOAST =====
  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ===== FETCH HELPERS =====
  async function api(path, options = {}) {
    const res = await fetch(`${API_URL}${path}`, {
      ...options,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
        ...(options.headers || {}),
      },
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Erro na requisição');
    return data;
  }

  // ===== CARREGAR USUÁRIOS =====
  let users = [];

  async function loadUsers() {
    const grid = document.getElementById('usersGrid');
    grid.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

    try {
      users = await api('/api/users');
      document.getElementById('userCount').textContent =
        `${users.length} usuário${users.length !== 1 ? 's' : ''} cadastrado${users.length !== 1 ? 's' : ''}`;
      renderUsers();
    } catch (err) {
      grid.innerHTML = '<div class="empty"><p>Erro ao carregar usuários.</p></div>';
    }
  }

  function renderUsers() {
    const grid = document.getElementById('usersGrid');

    if (users.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <p>Nenhum usuário cadastrado ainda.</p>
        </div>`;
      return;
    }

    grid.innerHTML = users.map((u, i) => `
      <div class="user-card" style="animation-delay:${i * 0.06}s">
        <div class="card-header">
          <div class="card-avatar">${(u.name || u.username)[0].toUpperCase()}</div>
          <div class="card-info">
            <div class="card-name">${u.name || u.username}</div>
            <div class="card-username">@${u.username}</div>
          </div>
          <span class="card-role role-${u.role}">${u.role === 'admin' ? 'Admin' : 'Usuário'}</span>
        </div>
        <div class="card-status">
          <span class="status-dot ${u.active ? 'active' : 'inactive'}"></span>
          ${u.active ? 'Ativo' : 'Desativado'}
        </div>
        <div class="card-actions">
          <button class="action-btn" onclick="openPasswordModal('${u._id}', '${u.name || u.username}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Alterar senha
          </button>
          <button class="action-btn warning" onclick="toggleUser('${u._id}', ${u.active})">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/>${u.active ? '<line x1="8" y1="12" x2="16" y2="12"/>' : '<line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>'}</svg>
            ${u.active ? 'Desativar usuário' : 'Ativar usuário'}
          </button>
          <button class="action-btn danger" onclick="openDeleteModal('${u._id}', '${u.name || u.username}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Deletar usuário
          </button>
        </div>
      </div>
    `).join('');
  }

  // ===== MODAIS =====
  function openModal(name) {
    document.getElementById(`modal${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.add('open');
  }
  function closeModal(name) {
    document.getElementById(`modal${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.remove('open');
  }

  // Fecha modal clicando fora
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target === el) el.classList.remove('open');
    });
  });

  // ===== CRIAR USUÁRIO =====
  async function createUser() {
    const name     = document.getElementById('newName').value.trim();
    const username = document.getElementById('newUsername').value.trim();
    const password = document.getElementById('newPassword').value;
    const role     = document.getElementById('newRole').value;

    if (!username || !password) return showToast('Preencha usuário e senha.', 'error');

    try {
      await api('/api/users', {
        method: 'POST',
        body: JSON.stringify({ name, username, password, role }),
      });
      closeModal('create');
      document.getElementById('newName').value = '';
      document.getElementById('newUsername').value = '';
      document.getElementById('newPassword').value = '';
      showToast('Usuário criado com sucesso!', 'success');
      loadUsers();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  // ===== ALTERAR SENHA =====
  let targetUserId = null;

  function openPasswordModal(id, name) {
    targetUserId = id;
    document.getElementById('passwordModalSub').textContent = `Nova senha para ${name}.`;
    document.getElementById('newPwValue').value = '';
    openModal('password');
  }

  async function changePassword() {
    const password = document.getElementById('newPwValue').value;
    if (!password || password.length < 6) return showToast('A senha deve ter pelo menos 6 caracteres.', 'error');

    try {
      await api(`/api/users/${targetUserId}/password`, {
        method: 'PUT',
        body: JSON.stringify({ password }),
      });
      closeModal('password');
      showToast('Senha alterada com sucesso!', 'success');
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  // ===== TOGGLE ATIVO/INATIVO =====
  async function toggleUser(id, currentActive) {
    try {
      const data = await api(`/api/users/${id}/toggle`, { method: 'PUT' });
      showToast(data.message, 'success');
      loadUsers();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  // ===== DELETAR USUÁRIO =====
  let deleteTargetId = null;

  function openDeleteModal(id, name) {
    deleteTargetId = id;
    document.getElementById('deleteModalSub').textContent =
      `Tem certeza que deseja deletar "${name}"? Esta ação não pode ser desfeita.`;
    openModal('delete');
  }

  async function deleteUser() {
    try {
      await api(`/api/users/${deleteTargetId}`, { method: 'DELETE' });
      closeModal('delete');
      showToast('Usuário deletado.', 'success');
      loadUsers();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  // ===== INIT =====
  loadUsers();
</script>
</body>
</html>
